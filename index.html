<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВЫЖИТЬ</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #110f12;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            text-align: center;
            overflow: hidden;
            cursor: default;
        }

        .image-container {
            margin-bottom: 30px;
            filter: grayscale(30%) contrast(120%);
            transition: transform 0.3s;
        }

        .image-container:hover {
            transform: scale(1.02) rotate(0.5deg);
        }

        .message {
            font-size: 24px;
            max-width: 600px;
            padding: 0 20px;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
            position: relative;
        }

        .message::after {
            content: "";
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #e0e0e0, transparent);
            opacity: 0.5;
        }

        /* Странные мерцающие точки на фоне */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 200px 200px;
            pointer-events: none;
            z-index: -1;
            animation: flicker 10s infinite alternate;
        }

        /* Эффект мерцания */
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            25% { opacity: 0.95; }
            50% { opacity: 0.98; }
            75% { opacity: 0.99; }
        }

        /* Текст с лёгкой дрожью */
        .shake {
            animation: shake 5s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-1px); }
            20%, 40%, 60%, 80% { transform: translateX(1px); }
        }

        /* Мигающий курсор (опционально) */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 24px;
            background: #e0e0e0;
            animation: blink 1s infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    
    <div class="image-container">
        <img src="https://i.pinimg.com/736x/4a/ae/0b/4aae0b89c6191cc408f41df790f64ffd.jpg" alt="Изображение">
    </div>
    
    <div class="message shake">
        вы попали сюда и ваша задача <strong>ВЫЖИТЬ</strong><span class="cursor"></span>
    </div>

    <script>
        // Случайные звуки при наведении (опционально)
        document.addEventListener('mousemove', (e) => {
            if (Math.random() > 0.99) {
                const whispers = ["шшш", "ты здесь?", "не оглядывайся", "беги"];
                const whisper = whispers[Math.floor(Math.random() * whispers.length)];
                console.log(whisper); // Можно заменить на звук
            }
        });

        // Изменение цвета текста при клике
        const message = document.querySelector('.message');
        message.addEventListener('click', () => {
            const colors = ['#e0e0e0', '#ff5555', '#55ff55', '#5555ff'];
            message.style.color = colors[Math.floor(Math.random() * colors.length)];
        });
    </script>
</body>
</html>
